<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HackerKernel - Technology Portfolio</title>

  <meta
    name="description"
    content="AI automation, Salesforce, SaaS, fintech, healthcare, mobile apps, UI/UX, and enterprise engineering portfolio."
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">

    <header>
      <h1>HackerKernel</h1>

      <p class="subtitle">
        AI Automation • Salesforce • SaaS • Mobile Apps • UI/UX • Enterprise Systems
      </p>
    </header>

    <section class="search-section">
      <input
        type="text"
        id="searchInput"
        placeholder="Search projects, technologies, categories..."
      />
    </section>
    <section class="filters">
    
      <button class="filter-btn active" data-filter="All">
        All
      </button>
    
      <button class="filter-btn" data-filter="Mobile Apps">
        Mobile Apps
      </button>
    
      <button class="filter-btn" data-filter="Salesforce">
        Salesforce
      </button>
    
      <button class="filter-btn" data-filter="AI & Automation">
        AI & Automation
      </button>
    
      <button class="filter-btn" data-filter="Website Projects">
        Website Projects
      </button>
    
      <button class="filter-btn" data-filter="Design Projects">
        Design Projects
      </button>
    
    </section>
    <section>
      <h2>Projects</h2>

      <div id="projectsGrid" class="grid"></div>
    </section>

  </div>

  <script type="module" src="/script.js"></script>

</body>
</html>
